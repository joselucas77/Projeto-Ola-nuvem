<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Olá, Nuvem - Frases</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main>
    <h1>Frase do Dia</h1>
    <p id="status">Carregando a resposta do servidor...</p>

    <p id="frase-do-dia"></p>

    <button id="btn-hora">Buscar Nova Frase</button>

    <!-- Link para a página de sorteio -->
    <div class="navegacao">
      <a href="sorteio.html" class="link-pagina">Ir para Saudação e Sorteio ➔</a>
    </div>
  </main>

  <script>
    const URL_DO_WORKER = "https://projeto-cloud-api.joselucasa937.workers.dev/hora";

    async function buscarFrase() {
      const status = document.getElementById("status");
      const fraseElemento = document.getElementById("frase-do-dia");

      status.textContent = "Buscando...";
      fraseElemento.textContent = "";

      try {
        const resposta = await fetch(URL_DO_WORKER);
        const dados = await resposta.json();

        status.textContent = "Hora do servidor: " + dados.horaDoServidor;
        fraseElemento.textContent = `"${dados.fraseDoDia}" — ${dados.autorDaFrase}`;

      } catch (erro) {
        status.textContent = "Erro na requisição. Confira a URL.";
      }
    }

    document.getElementById("btn-hora").addEventListener("click", buscarFrase);
    buscarFrase();
  </script>
</body>

</html>
