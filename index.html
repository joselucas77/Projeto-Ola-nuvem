<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Olá, Nuvem</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main>
    <h1>Olá, Nuvem</h1>
    <p id="status">Carregando a resposta do servidor...</p>

    <!-- Novo elemento para mostrar a frase -->
    <p id="frase-do-dia"></p>

    <button id="btn">Buscar de novo</button>
  </main>

  <script>
    const URL_DO_WORKER = "https://projeto-cloud-api.joselucasa937.workers.dev/";

    async function buscar() {
      const status = document.getElementById("status");
      const fraseElemento = document.getElementById("frase-do-dia");

      status.textContent = "Buscando...";
      fraseElemento.textContent = ""; // Limpa a frase anterior enquanto carrega

      try {
        const resposta = await fetch(URL_DO_WORKER);
        const dados = await resposta.json();

        status.textContent = dados.horaDoServidor;

        // Colocando a frase recebida do Worker na tela, incluindo o autor:
        fraseElemento.textContent = `"${dados.fraseDoDia}" — ${dados.autorDaFrase}`;

      } catch (erro) {
        status.textContent = "Não consegui falar com o Worker. Confira a URL.";
      }
    }

    document.getElementById("btn").addEventListener("click", buscar);
    buscar();
  </script>
</body>

</html>
